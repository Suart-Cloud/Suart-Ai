      padding: 14px 18px; display: flex; gap: 6px;

      width: 8px; height: 8px; background: #7c3aed;
      border-radius: 50%; animation: bounce 1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

      50% { transform: translateY(-6px); }
    }

      border-top: 1px solid #222;

</head>

// ===== حساب العمليات الرياضية =====
function calcAnswer(msg) {
  try {
    const cleaned = msg
      .replace(/زائد|plus/g, '+')
      .replace(/ناقص|minus/g, '-')
      .replace(/مضروب|times/g, '*')
      .replace(/قسمة|divide/g, '/')
      .replace(/[٠١٢٣٤٥٦٧٨٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d));
    const nums = cleaned.match(/[\d+\-*/().]+/g);
    if (nums) {
      const expr = nums.join('');
      const result = Function('"use strict"; return (' + expr + ')')();
      if (!isNaN(result)) return `النتيجة: ${result} 🧮`;
    }
  } catch(e) {}
  return 'اكتب العملية بالأرقام مثلاً: 5 + 3 🧮';
}

// ===== محرك البحث الذكي =====
function getReply(msg) {
  // فلتر المحتوى الغير لائق أولاً
  if (containsBanned(msg)) {
    return bannedReplies[Math.floor(Math.random() * bannedReplies.length)];
  }

  const clean = msg.toLowerCase()
    .replace(/[؟?!،,.]/g, ' ')
    .trim();

  let bestMatch = null;
  let bestScore = 0;

  for (const topic of Object.values(topics)) {
    for (const key of topic.keys) {
      if (clean.includes(key.toLowerCase())) {
        const score = key.length;
        if (score > bestScore) {
          bestScore = score;
          bestMatch = topic;
        }
      }
    }
  }

  if (bestMatch) {
    return typeof bestMatch.ans === 'function'
      ? bestMatch.ans(msg)
      : bestMatch.ans;
  }

  if (clean.includes('ليه') || clean.includes('لماذا') || clean.includes('why'))
    return 'سؤال عميق! 🤔 الإجابة بتتوقف على زاوية النظر. قولي أكتر وهحاول أساعدك.';
  if (clean.includes('كيف') || clean.includes('ازاي') || clean.includes('how'))
    return 'سؤال عملي كويس! 💡 قولي أكتر تفاصيل عن اللي بتسأل عنه.';
  if (clean.includes('هل') || clean.includes('is') || clean.includes('are'))
    return 'سؤال استفساري! 🧐 محتاج أكتر تفاصيل عشان أجاوبك صح.';
  if (clean.includes('احسن') || clean.includes('أفضل') || clean.includes('best'))
    return 'الأفضل بيتوقف على احتياجاتك! 😊 قولي أكتر وهساعدك تختار.';
  if (clean.includes('متى') || clean.includes('امتى') || clean.includes('when'))
    return 'سؤال عن الوقت! ⏰ قولي عن إيه بالظبط وهحاول أجاوبك.';

  const unknown = [
    'سؤال مثير! 🤔 جرب تسألني في العلوم أو الرياضة أو التطبيقات.',
    'معلش مش فاهم كويس! 😅 ممكن توضح أكتر؟',
    'موضوع جديد عليّ! 📚 جرب تسأل بكلمات أبسط.',
    'هممم! 🤷 اسألني في حاجة تانية وهساعدك.',
  ];
  return unknown[Math.floor(Math.random() * unknown.length)];
}

// ===== واجهة المستخدم =====
const chatBox = document.getElementById('chat-box');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const welcome = document.getElementById('welcome');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = input.scrollHeight + 'px';
});

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}
function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}
function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}
function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  welcome.style.display = 'none';
  addMsg(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  showTyping();
  setTimeout(() => {
    removeTyping();
    const reply = getReply(text);
    addMsg(typeof reply === 'function' ? reply() : reply, 'ai');
    sendBtn.disabled = false;
    input.focus();
  }, 700);
}
